<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expert Trésorerie - Dashboard Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body id="app-body">

    <div class="container">
        <header class="header-pro">
            <div class="logo-area" style="display: flex; align-items: center; gap: 15px;">
                <img id="logo-img" src="" alt="Logo" style="display:none; max-height: 50px; border-radius: 4px;">
                <div>
                    <h1 id="name-display" style="margin:0; font-size: 1.5rem;">Ma Trésorerie</h1>
                    <small id="siret-display" style="color: #666;">SIRET : -</small>
                </div>
            </div>
            <div class="main-actions">
                <button class="btn btn-theme" onclick="toggleTheme()" title="Changer de mode">🌓 Mode</button>
                <button class="btn btn-pdf" onclick="exporterPDF()">Rapport PDF</button>
            </div>
        </header>

        <section class="toolbar">
            <div class="config-inputs" style="display: flex; gap: 10px; flex-wrap: wrap; flex: 2;">
                <input type="text" id="inName" placeholder="Nom Entreprise">
                <input type="text" id="inSiret" placeholder="SIRET">
                <label class="tva-label" style="display: flex; align-items: center; gap: 5px; background: white; padding: 0 10px; border: 1px solid #ccc; border-radius: 6px;">
                    <input type="checkbox" id="tvaForce"> TVA dès 1€
                </label>
                <button class="btn" onclick="saveConfig()" style="background: #27ae60;">Enregistrer</button>
            </div>
            
            <div class="data-actions" style="display: flex; gap: 10px; flex-wrap: wrap; flex: 1; justify-content: flex-end;">
                <input type="file" id="logoInput" onchange="saveLogo(this)" style="display:none">
                <button class="btn" onclick="document.getElementById('logoInput').click()" style="background: #95a5a6;">Logo</button>
                
                <button class="btn btn-backup" onclick="exportData()">💾 Backup</button>
                <input type="file" id="importInput" onchange="importData(this)" style="display:none">
                <button class="btn" onclick="document.getElementById('importInput').click()" style="background: #9b59b6;">📂 Importer</button>
            </div>
        </section>

        <main class="main-layout">
            
            <section class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>Mois</th>
                            <th>CA Brut (€)</th>
                            <th>TVA (20%)</th>
                            <th>URSSAF (21.1%)</th>
                            <th>Frais (€)</th>
                            <th>Net Réel</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        </tbody>
                    <tfoot id="tfoot">
                        </tfoot>
                </table>
            </section>

            <section class="chart-section">
                <canvas id="mainChart"></canvas>
            </section>

        </main>

        <footer class="legal-notice" style="margin-top: 40px; font-size: 0.8rem; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 20px;">
            <p><strong>Sécurité & Confidentialité :</strong></p>
            <p>Cet outil fonctionne en local. Aucune donnée n'est envoyée sur un serveur tiers. Pensez à utiliser la fonction <strong>Backup</strong> régulièrement pour ne pas perdre vos saisies.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
